<!DOCTYPE html>
<html>
    <head>
        <title>StockMaster</title>
        <style>
        .promo {
        color: red;
        font-weight: bold;
        }
        </style>
    </head>
    <body>
        <h1>Gestion de Stock <h1>
        <div id="app">
            <!-- Le contenu est généré par le script -->
        </div>
         <script src="apiService.js"> </script>
         <script>
            function afficherPromo(){
                const container = document.getElementById('app');
                let listeProduits = container.children();
                for (produit of listeProduits){
                    if (produit.cat == "PROMO"){
                        produit.classList.add("promo")
                    }
                }
            }
         </script>
    </body>
</html>
